<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>携程AI智能助手</title>
<style>
  :root {
    --bg: #0b0f19;
    --surface: #131a2b;
    --surface2: #1a2340;
    --border: #1e2d50;
    --primary: #3b82f6;
    --primary-glow: rgba(59,130,246,0.3);
    --text: #e8ecf4;
    --text2: #8b95ad;
    --user-bg: linear-gradient(135deg, #1d4ed8, #3b82f6);
    --assistant-bg: #151e35;
    --approval-bg: linear-gradient(135deg, #4c1d95, #7c3aed);
    --radius: 18px;
    --radius-sm: 10px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.08), transparent),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,58,237,0.05), transparent);
  }

  /* ── Header ───────────────────────────────────── */
  .header {
    background: var(--surface);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 10;
  }
  .header-logo {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 16px var(--primary-glow);
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .header .online {
    margin-left: auto;
    font-size: 11px;
    color: #22c55e;
    display: flex; align-items: center; gap: 6px;
  }
  .header .online::before {
    content: ""; width: 7px; height: 7px;
    background: #22c55e; border-radius: 50%;
    box-shadow: 0 0 6px #22c55e;
  }

  /* ── Messages ─────────────────────────────────── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar {
    width: 4px;
  }
  .messages::-webkit-scrollbar-track {
    background: transparent;
  }
  .messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 99px;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text2);
    text-align: center;
    padding: 40px;
  }
  .empty-state .icon {
    width: 64px; height: 64px;
    border-radius: 20px;
    background: linear-gradient(135deg, #1d4ed8, #7c3aed);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    box-shadow: 0 0 40px rgba(59,130,246,0.2);
    margin-bottom: 4px;
  }
  .empty-state h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .empty-state p {
    font-size: 13px;
    max-width: 280px;
    line-height: 1.7;
  }
  .empty-state .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    justify-content: center;
  }
  .empty-state .chip {
    padding: 7px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: var(--transition);
    background: var(--surface);
  }
  .empty-state .chip:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: rgba(59,130,246,0.08);
  }

  /* ── Message bubbles ─────────────────────────── */
  .msg-row {
    display: flex;
    gap: 10px;
    max-width: 82%;
    animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes msgIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .msg-row.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .msg-row.assistant,
  .msg-row.approval {
    align-self: flex-start;
  }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    margin-top: 2px;
  }
  .msg-row.user .msg-avatar {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
  }
  .msg-row.assistant .msg-avatar {
    background: linear-gradient(135deg, #1e293b, #334155);
  }
  .msg-row.approval .msg-avatar {
    background: linear-gradient(135deg, #6d28d9, #8b5cf6);
  }

  .msg-bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
    word-break: break-word;
  }
  .msg-row.user .msg-bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 6px;
    color: #fff;
  }
  .msg-row.assistant .msg-bubble {
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
  }
  .msg-row.approval .msg-bubble {
    background: var(--approval-bg);
    border-bottom-left-radius: 6px;
    color: #f5f3ff;
    box-shadow: 0 0 20px rgba(124,58,237,0.2);
  }
  .msg-bubble .role-label {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
    opacity: 0.7;
    text-transform: uppercase;
    font-size: 10px;
  }

  /* Typing cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--primary);
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 0.9s steps(1) infinite;
    border-radius: 1px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Input area ──────────────────────────────── */
  .input-area {
    padding: 12px 20px 16px;
    position: relative;
  }
  .input-wrapper {
    display: flex;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px;
    transition: var(--transition);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .input-wrapper:focus-within {
    border-color: var(--primary);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3), 0 0 0 3px var(--primary-glow);
  }
  .input-area input {
    flex: 1;
    padding: 10px 12px;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 14.5px;
    outline: none;
    font-family: inherit;
  }
  .input-area input::placeholder {
    color: #4a5568;
  }
  .input-area button {
    padding: 10px 22px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: var(--transition);
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }
  .input-area button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(37,99,235,0.45);
  }
  .input-area button:active {
    transform: scale(0.97);
  }
  .input-area button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ── Info bar ─────────────────────────────────── */
  .info-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    font-size: 11px;
    color: #475569;
    padding: 0 20px 8px;
    user-select: none;
  }
  .info-bar .pid-group {
    display: flex; align-items: center; gap: 6px;
  }
  .info-bar label {
    color: #475569;
  }
  .info-bar input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    width: 120px;
    outline: none;
    transition: var(--transition);
    font-family: inherit;
  }
  .info-bar input:focus {
    border-color: var(--primary);
  }
  .info-bar .divider {
    width: 1px; height: 12px;
    background: var(--border);
    border-radius: 99px;
  }

  /* ── Responsive ──────────────────────────────── */
  @media (max-width: 600px) {
    .msg-row { max-width: 92%; }
    .header h1 { font-size: 14px; }
    .input-area { padding: 10px 12px 14px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">✈</div>
  <h1>携程AI助手</h1>
  <span class="online">在线</span>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="icon">✈</div>
    <h2>你好，需要什么帮助？</h2>
    <p>我可以帮你查询和预订机票、酒店、租车及景点门票</p>
    <div class="chips">
      <span class="chip" onclick="quickSend('帮我查一下我的航班信息')">查航班</span>
      <span class="chip" onclick="quickSend('帮我订一家上海的酒店')">订酒店</span>
      <span class="chip" onclick="quickSend('帮我租一辆车')">租车</span>
      <span class="chip" onclick="quickSend('推荐北京的景点')">景点</span>
    </div>
  </div>
</div>

<!-- Info bar -->
<div class="info-bar">
  <span>会话 <strong id="tid" style="color:#8b95ad">—</strong></span>
  <span class="divider"></span>
  <span class="pid-group">
    <label>旅客ID</label>
    <input id="pid" value="3442 587242" />
  </span>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-wrapper">
    <input id="input" placeholder="输入消息…" autofocus />
    <button id="send">发送</button>
  </div>
</div>

<script>
const MSGS = document.getElementById("messages");
const INPUT = document.getElementById("input");
const SEND = document.getElementById("send");
const TID = document.getElementById("tid");
const PID = document.getElementById("pid");
const EMPTY = document.getElementById("emptyState");

let threadId = localStorage.getItem("chat_thread_id") || crypto.randomUUID();
localStorage.setItem("chat_thread_id", threadId);
TID.textContent = threadId.slice(0, 8) + '…';

let passengerId = localStorage.getItem("chat_passenger_id") || "3442 587242";
PID.value = passengerId;
PID.addEventListener("change", () => {
  passengerId = PID.value.trim();
  localStorage.setItem("chat_passenger_id", passengerId);
});

function addMsg(role, text) {
  if (EMPTY) EMPTY.remove();

  const row = document.createElement("div");
  row.className = "msg-row " + role;

  const avatar = document.createElement("div");
  avatar.className = "msg-avatar";
  avatar.textContent = role === "user" ? "👤" : role === "approval" ? "🛡" : "🤖";

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.innerHTML = text;

  row.appendChild(avatar);
  row.appendChild(bubble);
  MSGS.appendChild(row);
  MSGS.scrollTop = MSGS.scrollHeight;
  return bubble;
}

function quickSend(msg) {
  INPUT.value = msg;
  send();
}

async function send() {
  const text = INPUT.value.trim();
  if (!text) return;
  addMsg("user", '<div class="role-label">你</div>' + escapeHtml(text));
  INPUT.value = "";
  SEND.disabled = true;

  let bubble = null;
  let streamedText = "";

  try {
    const resp = await fetch("/api/graph/", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: text, thread_id: threadId, passenger_id: passengerId})
    });

    if (!resp.ok) {
      addMsg("assistant", '<div class="role-label">AI助手</div>请求失败: HTTP ' + resp.status);
      SEND.disabled = false;
      INPUT.focus();
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6);
        if (payload === "[DONE]") break;

        try {
          const { content, type } = JSON.parse(payload);

          if (type === "error") {
            if (bubble) bubble.parentElement.remove();
            bubble = addMsg("assistant", '<div class="role-label">AI助手</div>' + escapeHtml(content));
            break;
          }

          if (type === "token") {
            streamedText += content;
            if (!bubble) {
              bubble = addMsg("assistant", "");
            }
            bubble.innerHTML = '<div class="role-label">AI助手</div>' + escapeHtml(streamedText) + '<span class="cursor"></span>';
            MSGS.scrollTop = MSGS.scrollHeight;
          }

          if (type === "approval") {
            if (bubble) {
              const row = bubble.parentElement;
              row.className = "msg-row approval";
              row.querySelector(".msg-avatar").textContent = "🛡";
            } else {
              bubble = addMsg("approval", "");
            }
            bubble.innerHTML = '<div class="role-label">待确认</div>' + escapeHtml(content);
            MSGS.scrollTop = MSGS.scrollHeight;
          }
        } catch {}
      }
    }

    if (bubble) {
      bubble.innerHTML = bubble.innerHTML.replace('<span class="cursor"></span>', '');
    }
  } catch (e) {
    if (bubble) bubble.parentElement.remove();
    addMsg("assistant", '<div class="role-label">AI助手</div>' + escapeHtml(e.message));
  }
  SEND.disabled = false;
  INPUT.focus();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

SEND.addEventListener("click", send);
INPUT.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
</script>
</body>
</html>
